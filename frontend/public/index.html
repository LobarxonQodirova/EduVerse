<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3B82F6" />
    <meta name="description" content="EduVerse - Modern Learning Management System" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>EduVerse LMS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        #root { min-height: 100vh; }
        .app-loader {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #f8fafc;
        }
        .app-loader .spinner {
            width: 48px; height: 48px; border: 4px solid #e2e8f0;
            border-top-color: #3B82F6; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run EduVerse.</noscript>
    <div id="root">
        <div class="app-loader"><div class="spinner"></div></div>
    </div>
</body>
</html>
